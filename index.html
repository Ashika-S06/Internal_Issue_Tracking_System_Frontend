<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IssueDesk — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .auth-left {
      background: var(--dark);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .auth-left::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99,230,153,0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }
    .auth-left::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(56,182,255,0.1) 0%, transparent 70%);
      bottom: -50px;
      left: 100px;
      pointer-events: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 60px;
    }
    .brand-icon {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand-icon svg { width: 24px; height: 24px; fill: var(--dark); }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: white;
      letter-spacing: -0.5px;
    }
    .auth-tagline {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      color: white;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 24px;
    }
    .auth-tagline span { color: var(--accent); }
    .auth-desc {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      max-width: 340px;
    }
    .stats-row {
      display: flex;
      gap: 40px;
      margin-top: 60px;
    }
    .stat-item {}
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: white;
    }
    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .auth-right {
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }
    .auth-form-wrap {
      width: 100%;
      max-width: 380px;
    }
    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .form-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }
    .form-subtitle a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .form-subtitle a:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-left { display: none; }
      .auth-right { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span class="brand-name">IssueDesk</span>
      </div>
      <div class="auth-tagline">Track.<br>Resolve.<span><br>Deliver.</span></div>
      <p class="auth-desc">A streamlined issue tracking system that keeps your team aligned and your projects on track.</p>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-num">99%</div>
          <div class="stat-label">Uptime</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">3x</div>
          <div class="stat-label">Faster Resolution</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">∞</div>
          <div class="stat-label">Issues Tracked</div>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-form-wrap">
        <div class="form-title">Welcome back</div>
        <p class="form-subtitle">Don't have an account? <a href="register.html">Register here</a></p>

        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="username" placeholder="Enter your username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="Enter your password">
          </div>
        </div>

        <button class="btn btn-primary btn-full" onclick="login()">
          Sign In
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

        <div id="loginMsg" class="form-msg"></div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>

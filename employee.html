<!DOCTYPE html>
<html>
<head>
  <title>Employee Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <h3>Employee Dashboard</h3>
  <button onclick="logout()">Logout</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('create')">Create Issue</div>
  <div class="tab" onclick="showTab('view')">My Issues</div>
</div>

<!-- CREATE ISSUE -->
<div id="createTab" class="container">
  <h3>Create Issue</h3>
  <input id="title" placeholder="Title">
  <input id="description" placeholder="Description">
  <button onclick="createIssue()">Submit</button>
</div>

<!-- VIEW ISSUES -->
<div id="viewTab" style="display:none;">
  <h3>My Issues</h3>
  <div id="issues"></div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/employee.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IssueDesk — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .app-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--dark);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
      padding: 0 8px;
    }
    .sidebar-brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-brand-icon svg { width: 20px; height: 20px; fill: none; stroke: var(--dark); stroke-width: 2; }
    .sidebar-brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: white;
    }
    .admin-badge {
      font-size: 9px;
      background: rgba(251,146,60,0.2);
      color: #fb923c;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 4px;
    }
    .sidebar-nav { flex: 1; }
    .nav-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.25);
      padding: 0 14px;
      margin: 20px 0 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(99,230,153,0.15); color: var(--accent); }
    .sidebar-footer {
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #fb923c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 600; color: white; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      transition: all 0.2s;
      border: none;
      background: transparent;
      width: 100%;
    }
    .logout-btn svg { width: 16px; height: 16px; }
    .logout-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; }

    .main-content {
      background: var(--bg);
      padding: 40px;
      overflow-y: auto;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .page-sub { font-size: 14px; color: var(--text-muted); }
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      width: auto;
    }
    .refresh-btn svg { width: 15px; height: 15px; }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(99,230,153,0.06); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
    }
    .stat-label-top {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-top: 10px;
    }
    .dot-all { background: var(--accent); }
    .dot-open { background: #f87171; }
    .dot-progress { background: #fb923c; }
    .dot-resolved { background: var(--accent); }

    /* Filters */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      width: auto;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: var(--dark); color: white; border-color: var(--dark); }

    /* Admin Issue Cards */
    .issues-list { display: flex; flex-direction: column; gap: 12px; }
    .issue-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      transition: all 0.2s;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .issue-card:hover { border-color: rgba(99,230,153,0.4); }
    .issue-card-left {}
    .issue-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .issue-id {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 6px;
    }
    .issue-title-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .issue-desc-text {
      font-size: 13px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 500px;
    }
    .issue-card-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-select {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      min-width: 150px;
      outline: none;
      transition: border-color 0.2s;
    }
    .status-select:focus { border-color: var(--accent); }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-sub { font-size: 14px; }

    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .app-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main-content { padding: 24px 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .issue-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div>
          <span class="sidebar-brand-name">IssueDesk</span>
          <span class="admin-badge">Admin</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Overview</div>
        <div class="nav-item active">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          All Issues
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-row">
          <div class="user-avatar">A</div>
          <div>
            <div class="user-name">Admin</div>
            <div class="user-role">Administrator</div>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Issue Management</div>
          <div class="page-sub">Review and update all team issues</div>
        </div>
        <button class="refresh-btn" onclick="loadIssues()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label-top">Total Issues</div>
          <div class="stat-value" id="statTotal">—</div>
          <div><span class="stat-dot dot-all"></span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label-top">Open</div>
          <div class="stat-value" id="statOpen">—</div>
          <div><span class="stat-dot dot-open"></span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label-top">In Progress</div>
          <div class="stat-value" id="statProgress">—</div>
          <div><span class="stat-dot dot-progress"></span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label-top">Resolved</div>
          <div class="stat-value" id="statResolved">—</div>
          <div><span class="stat-dot dot-resolved"></span></div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <button class="filter-chip active" onclick="filterIssues('ALL', this)">All</button>
        <button class="filter-chip" onclick="filterIssues('OPEN', this)">Open</button>
        <button class="filter-chip" onclick="filterIssues('IN_PROGRESS', this)">In Progress</button>
        <button class="filter-chip" onclick="filterIssues('RESOLVED', this)">Resolved</button>
      </div>

      <!-- Issues List -->
      <div id="issues" class="issues-list"></div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
